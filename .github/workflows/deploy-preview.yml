name: Deploy Preview

on:
  push:
    branches: [dev, staging]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Surge
        run: npm install -g surge

      - name: Set deploy domain
        id: domain
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            echo "url=staging.annielovessnakes.com" >> $GITHUB_OUTPUT
          else
            echo "url=dev.annielovessnakes.com" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Surge
        run: surge . ${{ steps.domain.outputs.url }} --token ${{ secrets.SURGE_TOKEN }}
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
